<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leemyungsu Design Lab | Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        /* 기본 배경 설정: 검은색 여백 */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
        }
        .swiper { 
            width: 100%; 
            height: 100vh; 
        }
        .swiper-slide { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000; 
        }
        /* 이미지 설정: 비율 유지하며 화면 안에 쏙 들어오게 (안 잘림) */
        .swiper-slide img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }
        /* 화살표 색상 흰색으로 변경 */
        .swiper-button-next, .swiper-button-prev {
            color: #fff !important;
        }
        /* 하단 페이지 점 색상 */
        .swiper-pagination-bullet {
            background: #fff !important;
        }
    </style>
</head>
<body>

<div class="swiper">
    <div class="swiper-wrapper">
        <div class="swiper-slide"><img src="00.jpg"></div>
        <div class="swiper-slide"><img src="01.jpg"></div>
        <div class="swiper-slide"><img src="02.jpg"></div>
        <div class="swiper-slide"><img src="03.jpg"></div>
        <div class="swiper-slide"><img src="04.jpg"></div>
        <div class="swiper-slide"><img src="05.jpg"></div>
        <div class="swiper-slide"><img src="06.jpg"></div>
        <div class="swiper-slide"><img src="07.jpg"></div>
        <div class="swiper-slide"><img src="08.jpg"></div>
        <div class="swiper-slide"><img src="09.jpg"></div>
        <div class="swiper-slide"><img src="10.jpg"></div>
        <div class="swiper-slide"><img src="11.jpg"></div>
        <div class="swiper-slide"><img src="12.jpg"></div>
        <div class="swiper-slide"><img src="14.jpg"></div>
        <div class="swiper-slide"><img src="15.jpg"></div>
    </div>
    
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
    
    <div class="swiper-pagination"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const swiper = new Swiper('.swiper', {
        loop: true,               // 무한 반복
        mousewheel: true,         // 마우스 휠 지원
        keyboard: { enabled: true }, // 키보드 화살표 지원
        pagination: { 
            el: '.swiper-pagination', 
            clickable: true 
        },
        navigation: { 
            nextEl: '.swiper-button-next', 
            prevEl: '.swiper-button-prev' 
        },
    });
</script>
</body>
</html>
