<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이명수 | Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Pretendard', sans-serif; color: #fff; overflow: hidden; }
        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { display: flex; align-items: center; justify-content: center; background: #000; }
        .swiper-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .swiper-button-next, .swiper-button-prev { color: #fff !important; }
        .swiper-pagination-bullet { background: #fff !important; opacity: 0.5; }
        .swiper-pagination-bullet-active { opacity: 1; }
        .contact-info { position: absolute; bottom: 25px; right: 25px; z-index: 10; font-size: 14px; color: rgba(255,255,255,0.5); text-align: right; }
    </style>
</head>
<body>

<div class="swiper">
    <div class="swiper-wrapper">
        <div class="swiper-slide"><img src="00.jpg"></div>
        <div class="swiper-slide"><img src="01.jpg"></div>
        <div class="swiper-slide"><img src="02.jpg"></div>
        <div class="swiper-slide"><img src="03.jpg"></div>
        <div class="swiper-slide"><img src="04.jpg"></div>
        <div class="swiper-slide"><img src="05.jpg"></div>
        <div class="swiper-slide"><img src="06.jpg"></div>
        <div class="swiper-slide"><img src="07.jpg"></div>
        <div class="swiper-slide"><img src="08.jpg"></div>
        <div class="swiper-slide"><img src="09.jpg"></div>
        <div class="swiper-slide"><img src="10.jpg"></div>
        <div class="swiper-slide"><img src="11.jpg"></div>
        <div class="swiper-slide"><img src="12.jpg"></div>
        <div class="swiper-slide"><img src="13.jpg"></div> <div class="swiper-slide"><img src="14.jpg"></div>
        <div class="swiper-slide"><img src="15.jpg"></div>
    </div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-pagination"></div>
</div>

<div class="contact-info">
    <strong>이명수 (LEEMYUNGSU)</strong><br>
    leemyungsu@leemyungsu.com
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const swiper = new Swiper('.swiper', {
        loop: true,
        mousewheel: true,
        keyboard: { enabled: true },
        pagination: { el: '.swiper-pagination', clickable: true },
        navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
    });
</script>
</body>
</html>
