<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이명수 포트폴리오</title>
    <link rel="stylesheet" href="https://jsdelivr.net" />
    <style>
        /* 기본 레이아웃 설정 */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
        }

        /* 슬라이더 전체 크기: dvh는 모바일 주소창을 제외한 실제 화면 높이 */
        .swiper { 
            width: 100%; 
            height: 100vh; 
            height: 100dvh; 
        }

        /* 슬라이드 내부 이미지 정렬 */
        .swiper-slide { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; /* 가로모드 시 상하단 약간의 여백 */
            box-sizing: border-box;
        }

        /* [핵심] 이미지 비율 유지 및 화면 맞춤 */
        .swiper-slide img { 
            max-width: 100%; 
            max-height: 100%; 
            width: auto; 
            height: auto; 
            object-fit: contain; /* 비율 유지하며 영역 안에 맞춤 */
            pointer-events: none; /* 이미지 우클릭 방지 및 터치 간섭 최소화 */
        }

        /* 컨트롤러 디자인 수정 */
        .swiper-button-next, .swiper-button-prev { 
            color: #fff !important; 
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .swiper-button-next:hover, .swiper-button-prev:hover { opacity: 1; }
        .swiper-pagination-bullet { background: #fff !important; opacity: 0.5; }
        .swiper-pagination-bullet-active { opacity: 1; }

        /* 가로 모드(Landscape) 대응: 버튼 크기 축소 */
        @media (orientation: landscape) and (max-height: 500px) {
            .swiper-button-next, .swiper-button-prev { transform: scale(0.6); }
            .swiper-slide { padding: 5px; }
        }
    </style>
</head>
<body>
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="00.jpg"></div>
            <div class="swiper-slide"><img src="01.jpg"></div>
            <div class="swiper-slide"><img src="02.jpg"></div>
            <div class="swiper-slide"><img src="03.jpg"></div>
            <div class="swiper-slide"><img src="04.jpg"></div>
            <div class="swiper-slide"><img src="05.jpg"></div>
            <div class="swiper-slide"><img src="06.jpg"></div>
            <div class="swiper-slide"><img src="07.jpg"></div>
            <div class="swiper-slide"><img src="08.jpg"></div>
            <div class="swiper-slide"><img src="09.jpg"></div>
            <div class="swiper-slide"><img src="10.jpg"></div>
            <div class="swiper-slide"><img src="11.jpg"></div>
            <div class="swiper-slide"><img src="12.jpg"></div>
            <div class="swiper-slide"><img src="13.jpg"></div>
            <div class="swiper-slide"><img src="14.jpg"></div>
            <div class="swiper-slide"><img src="15.jpg"></div>
        </div>
        <!-- 네비게이션 버튼 -->
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
        <!-- 페이지네이션 -->
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://jsdelivr.net"></script>
    <script>
        new Swiper('.swiper', {
            loop: true,
            mousewheel: true, // 마우스 휠 지원
            keyboard: { enabled: true }, // 키보드 방향키 지원
            grabCursor: true, // 마우스 커서 손모양
            resistanceRatio: 0, // 슬라이드 끝 저항 제거
            navigation: { 
                nextEl: '.swiper-button-next', 
                prevEl: '.swiper-button-prev' 
            },
            pagination: { 
                el: '.swiper-pagination', 
                clickable: true,
                dynamicBullets: true // 불렛이 너무 많으면 작게 줄여주는 기능
            },
        });
    </script>
</body>
</html>
