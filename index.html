<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>이명수 포트폴리오</title>
    
    <!-- Swiper CSS (공식 CDN 사용) -->
    <link rel="stylesheet" href="https://unpkg.com" />
    
    <style>
        /* 기본 스타일 및 모바일 대응 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
        }

        /* 슬라이더 영역: 화면 전체 꽉 채움 */
        .swiper { 
            width: 100%; 
            height: 100vh; 
            height: 100dvh; /* 모바일 주소창 대응 */
        }

        .swiper-slide { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000;
        }

        /* 이미지 비율 유지 및 잘림 방지 핵심 */
        .swiper-slide img { 
            max-width: 100%; 
            max-height: 100%; 
            width: auto; 
            height: auto; 
            object-fit: contain; 
        }

        /* 컨트롤러 색상 (이미지가 흰색일 때 대비) */
        .swiper-button-next, .swiper-button-prev { color: #fff !important; }
        .swiper-pagination-bullet { background: #fff !important; }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper">
            <!-- 00.jpg부터 15.jpg까지 순서대로 -->
            <div class="swiper-slide"><img src="00.jpg"></div>
            <div class="swiper-slide"><img src="01.jpg"></div>
            <div class="swiper-slide"><img src="02.jpg"></div>
            <div class="swiper-slide"><img src="03.jpg"></div>
            <div class="swiper-slide"><img src="04.jpg"></div>
            <div class="swiper-slide"><img src="05.jpg"></div>
            <div class="swiper-slide"><img src="06.jpg"></div>
            <div class="swiper-slide"><img src="07.jpg"></div>
            <div class="swiper-slide"><img src="08.jpg"></div>
            <div class="swiper-slide"><img src="09.jpg"></div>
            <div class="swiper-slide"><img src="10.jpg"></div>
            <div class="swiper-slide"><img src="11.jpg"></div>
            <div class="swiper-slide"><img src="12.jpg"></div>
            <div class="swiper-slide"><img src="13.jpg"></div>
            <div class="swiper-slide"><img src="14.jpg"></div>
            <div class="swiper-slide"><img src="15.jpg"></div>
        </div>
        
        <!-- 네비게이션/페이지네이션 구성 요소 -->
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-pagination"></div>
    </div>

    <!-- Swiper JS (공식 CDN 사용) -->
    <script src="https://unpkg.com"></script>

    <script>
        // 모든 리소스 로드 후 실행
        window.onload = function() {
            const swiper = new Swiper('.swiper', {
                loop: true,
                speed: 500,
                mousewheel: true, // 마우스 휠
                keyboard: { enabled: true }, // 키보드
                navigation: { 
                    nextEl: '.swiper-button-next', 
                    prevEl: '.swiper-button-prev' 
                },
                pagination: { 
                    el: '.swiper-pagination', 
                    clickable: true,
                    dynamicBullets: true 
                }
            });
        };
    </script>
</body>
</html>
