<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이명수 포트폴리오</title>
    
    <!-- 1. Swiper CSS (반드시 필요) -->
    <link rel="stylesheet" href="https://jsdelivr.net" />
    
    <style>
        /* 기본 스타일 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; }

        /* 슬라이더 컨테이너 설정 */
        .swiper {
            width: 100%;
            height: 100vh; /* 구형 기기 대비 */
            height: 100dvh; /* 최신 모바일 주소창 대응 */
        }

        /* 슬라이드 내부 이미지 정렬 */
        .swiper-slide {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* 이미지 비율 유지 및 잘림 방지 */
        .swiper-slide img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain; /* 화면 안에 쏙 들어가게 함 */
        }

        /* 컨트롤러 색상 수정 (이미지가 밝을 때 대비) */
        .swiper-button-next, .swiper-button-prev { color: #fff !important; }
        .swiper-pagination-bullet { background: #fff !important; }
    </style>
</head>
<body>

    <div class="swiper">
        <!-- 반드시 swiper-wrapper로 감싸야 합니다 -->
        <div class="swiper-wrapper">
            <!-- 이미지 경로가 정확한지 꼭 확인하세요 -->
            <div class="swiper-slide"><img src="00.jpg"></div>
            <div class="swiper-slide"><img src="01.jpg"></div>
            <div class="swiper-slide"><img src="02.jpg"></div>
            <div class="swiper-slide"><img src="03.jpg"></div>
            <div class="swiper-slide"><img src="04.jpg"></div>
            <div class="swiper-slide"><img src="05.jpg"></div>
            <div class="swiper-slide"><img src="06.jpg"></div>
            <div class="swiper-slide"><img src="07.jpg"></div>
            <div class="swiper-slide"><img src="08.jpg"></div>
            <div class="swiper-slide"><img src="09.jpg"></div>
            <div class="swiper-slide"><img src="10.jpg"></div>
            <div class="swiper-slide"><img src="11.jpg"></div>
            <div class="swiper-slide"><img src="12.jpg"></div>
            <div class="swiper-slide"><img src="13.jpg"></div>
            <div class="swiper-slide"><img src="14.jpg"></div>
            <div class="swiper-slide"><img src="15.jpg"></div>
        </div>
        
        <!-- 컨트롤러 (선택 사항) -->
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-pagination"></div>
    </div>

    <!-- 2. Swiper JS (반드시 필요) -->
    <script src="https://jsdelivr.net"></script>

    <!-- 3. 슬라이더 실행 스크립트 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const swiper = new Swiper('.swiper', {
                loop: true,               // 무한 루프
                speed: 600,               // 넘어가는 속도
                mousewheel: true,         // 마우스 휠 사용 가능
                keyboard: { enabled: true }, // 키보드 방향키 사용 가능
                touchAngle: 45,           // 터치 민감도 조절
                navigation: {
                    nextEl: '.swiper-button-next',
                    prevEl: '.swiper-button-prev',
                },
                pagination: {
                    el: '.swiper-pagination',
                    clickable: true,
                    dynamicBullets: true,
                },
            });
        });
    </script>
</body>
</html>
